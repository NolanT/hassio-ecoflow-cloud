syntax = "proto3";

// pdata for cmd_func=254, cmd_id=21  (Smart Panel 40 property upload)
// Field numbers sourced from DevAplComm.java (decompiled EcoFlow 6.11.0 app).

// Per-circuit real-time measurement  (fields 1015 – 1054)
message ChannelSampleInfo {
  float voltage      = 1;   // Line voltage, V
  float reactive_pwr = 2;   // Reactive power, VAR (signed)
  float current      = 3;   // Current, A
}

// Per-circuit configuration / status  (fields 794 – 833)
message ChannelStatus {
  int32  enabled   = 1;  // 1 = enabled
  bytes  ev_config = 2;  // EV-charger sub-config (optional)
  float  max_amps  = 3;  // Breaker rating, A (e.g. 20.0)
  int32  position  = 4;  // Breaker slot number
  string name      = 5;  // User-assigned circuit name
  int32  flag      = 6;  // Misc flag (e.g. 1 = double-pole)
  bytes  index     = 7;  // Index bytes
}

message SmartPanel40Status {
  // ── System power ──────────────────────────────────────────────────────────
  float  pcl_pwr_offset           = 53;   // Total grid power, W (negative = export)
  string utc_timezone_id          = 134;  // Timezone string
  float  pow_get_sys_grid         = 515;  // System grid power, W
  float  pow_get_sys_load         = 516;  // Total home load, W
  float  pow_get_pv_sum           = 517;  // Total PV power, W
  float  pow_get_bp_cms           = 518;  // Battery/inverter power, W (positive = charging)
  float  pow_get_load_output_sum  = 1227; // Load output sum, W

  // ── Load source breakdown ─────────────────────────────────────────────────
  float  pow_get_sys_load_from_pv   = 1002; // Home load sourced from PV, W
  float  pow_get_sys_load_from_bp   = 1003; // Home load sourced from battery, W
  float  pow_get_sys_load_from_grid = 1004; // Home load sourced from grid, W

  // ── Generator ────────────────────────────────────────────────────────────
  float  pow_get_standby_generator  = 781;  // Standby generator power, W
  float  pow_get_portable_generator = 782;  // Portable generator power, W

  // ── CMS Battery (mirrored from OceanPro) ──────────────────────────────────
  int32  cms_chg_rem_time         = 269;  // Charge remaining time, seconds
  int32  cms_batt_store_energy    = 1682; // Current stored energy, Wh
  int32  cms_batt_pow_in_remain   = 1462; // Remaining charge power, W

  // ── Grid phase measurements ───────────────────────────────────────────────
  float  grid_connection_vol_l1            = 956;  // Grid voltage L1, V
  float  grid_connection_vol_l2            = 957;  // Grid voltage L2, V
  float  grid_connection_amp_l1            = 958;  // Grid current L1, A
  float  grid_connection_amp_l2            = 959;  // Grid current L2, A
  // Fields 960/961: period in microseconds (Hz = 1_000_000 / value); converted in _prepare_data
  float  grid_connection_freq_period_l1    = 960;  // Grid period L1, μs (raw)
  float  grid_connection_freq_period_l2    = 961;  // Grid period L2, μs (raw)
  float  grid_connection_power_l1          = 962;  // Grid active power L1, W (negative = export)
  float  grid_connection_power_l2          = 963;  // Grid active power L2, W (negative = export)
  float  grid_connection_reactive_power_l1 = 964;  // Grid reactive power L1, VAR
  float  grid_connection_reactive_power_l2 = 965;  // Grid reactive power L2, VAR
  float  grid_connection_apparent_power_l1 = 966;  // Grid apparent power L1, VA
  float  grid_connection_apparent_power_l2 = 967;  // Grid apparent power L2, VA

  // ── Panel bus voltage ─────────────────────────────────────────────────────
  float  panel_bus_vol_l1         = 1063; // Panel bus voltage L1, V
